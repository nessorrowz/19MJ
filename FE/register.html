<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – I9MJ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --teal:       #0f7c82;
    --teal-light: #12939b;
    --teal-dark:  #0a565a;
    --white:      #ffffff;
    --gray-100:   #f5f7f8;
    --gray-300:   #d1d9dd;
    --gray-500:   #7a8c91;
    --text:       #1a2c2e;
    --radius:     14px;
    --shadow:     0 8px 32px rgba(15,124,130,.15);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    overflow: hidden;
    position: relative;
  }

  /* ── LEFT PANEL ───────────────────────────── */
  .left {
    flex: 0 0 65%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 100px;
    position: relative;
    background: var(--white);
    z-index: 2;
  }

  /* ── RIGHT PANEL ──────────────────────────── */
  .right {
    flex: 0 0 35%;
    background: var(--teal);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: visible;
  }

  /* Wave SVG on left edge of right panel */
  .wave-svg {
    position: absolute;
    left: -79px;
    top: 0;
    height: 100%;
    width: 80px;
    z-index: 3;
    pointer-events: none;
  }

  /* subtle noise texture */
  .right::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 0;
  }

  .right-circle {
    position: absolute;
    bottom: -80px;
    right: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    z-index: 0;
  }
  .right-circle2 {
    position: absolute;
    top: -60px;
    left: -60px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,.05);
    z-index: 0;
  }

  .logo {
    position: absolute;
    top: 24px;
    right: 28px;
    z-index: 2;
    height: 52px;
    width: auto;
    object-fit: contain;
  }

  .hero-img {
    position: relative;
    z-index: 2;
    width: 82%;
    max-width: 420px;
    object-fit: contain;
    animation: float 4s ease-in-out infinite;
    margin-bottom: 0;
    display: block;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }

  /* ── CARD ─────────────────────────────────── */
  .card {
    width: 100%;
    max-width: 520px;
    animation: slideUp .55s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .card-header { margin-bottom: 28px; }

  .card-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: var(--text);
    line-height: 1.1;
  }

  .card-header p {
    margin-top: 8px;
    color: var(--gray-500);
    font-size: 14px;
    font-weight: 300;
  }

  /* ── INPUTS ───────────────────────────────── */
  .field {
    position: relative;
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid var(--gray-300);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--gray-100);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }

  .field input:focus {
    border-color: var(--teal);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(15,124,130,.12);
  }

  /* ── BUTTONS ──────────────────────────────── */
  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, opacity .2s;
    margin-top: 6px;
  }
  .btn:active { transform: scale(.98); }

  .btn-primary {
    background: var(--teal);
    color: var(--white);
    box-shadow: 0 4px 18px rgba(15,124,130,.35);
    letter-spacing: .3px;
  }
  .btn-primary:hover { box-shadow: 0 6px 24px rgba(15,124,130,.45); }

  .divider {
    text-align: center;
    color: var(--gray-500);
    font-size: 13px;
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 38%;
    height: 1px;
    background: var(--gray-300);
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }

  .btn-google {
    background: var(--white);
    color: var(--text);
    border: 1.5px solid var(--gray-300);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 0;
  }
  .btn-google:hover { background: var(--gray-100); }

  .google-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .login-link {
    text-align: center;
    margin-top: 22px;
    font-size: 14px;
    color: var(--gray-500);
  }
  .login-link a {
    color: var(--teal);
    font-weight: 500;
    text-decoration: none;
    transition: opacity .2s;
  }
  .login-link a:hover { opacity: .75; }

  /* ── RESPONSIVE ───────────────────────────── */
  @media (max-width: 860px) {
    body { overflow: auto; flex-direction: column; }
    .left {
      flex: none;
      padding: 60px 30px 50px;
      width: 100%;
    }
    .right {
      flex: none;
      width: 100%;
      min-height: 280px;
    }
    .hero-img { width: 60%; max-width: 260px; margin-bottom: -20px; }
    .wave-svg { display: none; }
  }
</style>
</head>

<body>

<div class="left">
  <div class="card">

    <div class="card-header">
      <h2>Create Account</h2>
      <p>Daftarkan dirimu dan mulai perjalananmu.</p>
    </div>

    <div class="field">
      <label for="username">Username / Email</label>
      <input id="username" type="text" placeholder="contoh@email.com">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input id="confirm" type="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" onclick="registerEffect(event)">Create Account</button>

    <div class="divider">Or With</div>

    <button class="btn btn-google">
      <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign up with Google
    </button>

    <div class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>

  </div>
</div>

<div class="right">
  <div class="right-circle"></div>
  <div class="right-circle2"></div>
  <img src="19mj.png" class="logo" alt="19MJ Logo">
  <!-- Wave shape on the left edge -->
  <svg class="wave-svg" viewBox="0 0 80 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M80,0 C30,200 30,600 80,800 L80,800 L80,0 Z" fill="#0f7c82"/>
  </svg>
  <img src="ceweray.png" class="hero-img" alt="Illustration">
</div>

<script>
function registerEffect(event) {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const confirm  = document.getElementById('confirm').value.trim();

  if (!username || !password || !confirm) {
    shake(document.querySelector('.card'));
    alert("Semua field wajib diisi");
    return;
  }

  if (password !== confirm) {
    shake(document.querySelector('.card'));
    alert("Password tidak sama");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];
  const exist = users.find(u => u.username === username);
  if (exist) {
    shake(document.querySelector('.card'));
    alert("Username sudah digunakan");
    return;
  }

  users.push({ username, password });
  localStorage.setItem("users", JSON.stringify(users));

  const btn = event.target;
  btn.innerText = "Creating...";
  btn.style.opacity = "0.7";
  btn.disabled = true;

  setTimeout(() => {
    alert("Register berhasil!");
    window.location.href = "login.html";
  }, 1000);
}

function shake(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake .4s ease';
}

const style = document.createElement('style');
style.textContent = `
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
`;
document.head.appendChild(style);
</script>

</body>
</html>
